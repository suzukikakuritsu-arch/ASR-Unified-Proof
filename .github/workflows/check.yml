name: ASR Proof CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 自分で 'lake' を叩かず、アクションにすべて任せる
      - name: Lean 4 Setup and Build
        uses: leanprover/lean-action@v1
        with:
          # ここを true にすると、アクションが内部で 
          # lake update と lake build を自動実行します。
          # これにより、パスの不整合（127エラー）が物理的に発生しなくなります。
          build: true

      # 2. ビルドが終わった後に、結果の統計だけを出す
      - name: Progress Report
        run: |
          echo "=== ASR Proof Progress Report ==="
          grep -r "sorry" . --include="*.lean" | wc -l || true
