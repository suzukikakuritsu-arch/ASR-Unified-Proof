name: ASR Proof CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install and Build (Unified)
        run: |
          # 1. Elanをインストール
          curl https://leanprover-community.github.io/elan/elan-init.sh -sSf | sh -s -- -y
          
          # 2. このシェルセッションにパスを強制注入
          source $HOME/.elan/env
          export PATH="$HOME/.elan/bin:$PATH"
          
          # 3. 実行ファイルの存在を執拗に確認
          which lake || (echo "ERROR: Lake is missing"; exit 1)
          
          # 4. ビルド実行
          echo "Starting lake update... (Be patient, Mathlib is huge)"
          lake update
          
          echo "Starting lake build..."
          lake build
          
          echo "=== ASR Proof Progress Report ==="
          grep -r "sorry" . --include="*.lean" | wc -l || true
