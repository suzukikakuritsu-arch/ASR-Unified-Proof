name: ASR Proof CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lean 4 Build and Proof Check
        uses: leanprover/lean-action@v1
        with:
          # ここでビルドを有効にします。
          # 自動的に lake update と lake build を実行してくれます。
          build: true

      - name: Progress Report
        # ビルドが終わった後に、結果だけを表示
        run: |
          echo "=== ASR Proof Status Report ==="
          grep -r "sorry" . --include="*.lean" | wc -l || true
