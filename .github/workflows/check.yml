name: ASR Proof CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Lean
        uses: leanprover/lean-action@v1
        with:
          # マニフェストがなくても、まず環境だけ作らせる
          build: false

      - name: Generate Manifest and Build
        run: |
          # マニフェストを作成し、Mathlibを同期
          lake update
          # プロジェクトをビルド
          lake build

      - name: Progress Report
        run: |
          echo "=== ASR Proof Status Report ==="
          grep -r "sorry" . --include="*.lean" | wc -l || true
