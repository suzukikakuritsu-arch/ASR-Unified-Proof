name: ASR Unified Proof CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. Leanの環境を整える
      - uses: leanprover/lean-action@v1
        with:
          # ビルドは次のステップで自分でやります
          build: false

      # 2. ここが魔法の一行です。
      # 注文書（manifest）がないなら、ビルドの直前に自分で作らせるだけ。
      - name: Build
        run: |
          source $HOME/.elan/env
          lake update   # これが「注文書」を自動生成するコマンドです
          lake build    # これでビルドが走ります
