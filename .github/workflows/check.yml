name: ASR Proof CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ここで elan とパスの設定が自動完結します
      - name: Install Lean 4
        uses: leanprover/lean-action@v1
        with:
          build: false # 後ほど手動で lake build を行うため

      - name: Lake Update
        run: lake update

      - name: Lake Build
        run: lake build

      - name: Progress Report
        run: |
          echo "=== ASR Proof Status Report ==="
          echo "Number of 'sorry' remaining in your proof:"
          grep -r "sorry" . --include="*.lean" | wc -l
