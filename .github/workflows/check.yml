name: ASR Proof CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Elan
        run: |
          curl https://leanprover-community.github.io/elan/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Lake Update & Build
        run: |
          lake update
          lake build
      - name: Sorry Counter
        run: |
          echo "Current Sorry Count:"
          grep -r "sorry" . | wc -l
