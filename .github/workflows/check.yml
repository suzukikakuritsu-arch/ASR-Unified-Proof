name: ASR Proof CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Lean
        uses: leanprover/lean-action@v1
        with:
          build: false

      - name: Hard-coded Path Build
        run: |
          # 環境変数 PATH を無視し、バイナリを直接指定して実行
          /home/runner/.elan/bin/lake update
          /home/runner/.elan/bin/lake build

      - name: Progress Report
        run: |
          echo "=== ASR Proof Status Report ==="
          grep -r "sorry" . --include="*.lean" | wc -l || true
