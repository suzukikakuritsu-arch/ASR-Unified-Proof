name: ASR Proof CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Elan
        run: |
          curl https://leanprover-community.github.io/elan/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Lake Update & Build
        run: |
          # パスを明示的に指定して実行
          $HOME/.elan/bin/lake update
          $HOME/.elan/bin/lake build

      - name: Check Progress
        run: |
          echo "=== ASR Proof Progress Report ==="
          echo "Remaining 'sorry' count:"
          grep -r "sorry" . | wc -l
