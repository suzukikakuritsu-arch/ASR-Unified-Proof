name: ASR Proof CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Elan
        run: |
          curl https://leanprover-community.github.io/elan/elan-init.sh -sSf | sh -s -- -y
          # 強制的にパスを通す
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Lake Update & Build
        run: |
          # 確実にパスを読み込んでから実行
          export PATH="$HOME/.elan/bin:$PATH"
          lake update
          lake build

      - name: Check Progress
        run: |
          echo "Remaining Sorry Count:"
          grep -r "sorry" . | wc -l
