name: ASR Proof CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Elan (Lean 4 Manager)
        run: |
          curl https://leanprover-community.github.io/elan/elan-init.sh -sSf | sh -s -- -y
          # 次のステップ以降でも見えるようにパスを追加
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Lake Update and Build
        run: |
          # このステップ内でも即座にパスを有効化
          export PATH="$HOME/.elan/bin:$PATH"
          
          # Mathlibの依存関係を解決
          lake update
          # プロジェクト全体をビルド
          lake build

      - name: Progress Report
        run: |
          echo "=== ASR Proof Status Report ==="
          echo "Count of remaining 'sorry':"
          grep -r "sorry" . | grep ".lean" | wc -l
