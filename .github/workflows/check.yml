name: ASR Proof CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Lean 4環境を自動構築する公式アクションを使用
      - name: Install Lean 4
        uses: leanprover/lean-action@v1
        with:
          # lean-toolchainファイルを自動参照します
          build: false

      - name: Lake Update
        run: lake update

      - name: Lake Build
        run: lake build

      - name: Progress Report
        run: |
          echo "=== ASR Proof Status Report ==="
          echo "Remaining 'sorry' count:"
          grep -r "sorry" . --include="*.lean" | wc -l
