name: ASR Proof CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # URLを叩くのではなく、公式がメンテナンスしているActionを使用
      - name: Setup Lean
        uses: leanprover/lean-action@v1
        with:
          # プロジェクト内の lean-toolchain を自動で読み取ります
          build: false 

      - name: Lake Update
        # このステップでは既にパスが通っています
        run: lake update

      - name: Lake Build
        run: lake build

      - name: Progress Report
        run: |
          echo "=== ASR Proof Status Report ==="
          grep -r "sorry" . --include="*.lean" | wc -l || true
