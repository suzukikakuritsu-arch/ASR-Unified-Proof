name: ASR Build and Proof Check

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Elan (Lean 4 Manager)
        run: |
          curl https://leanprover-community.github.io/elan/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Build Project
        run: |
          lake build
      - name: Proof Statistics
        run: |
          # プロジェクト内の sorry の数をカウントして報告する
          grep -r "sorry" . | wc -l
